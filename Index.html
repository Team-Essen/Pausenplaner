<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Team Pausen-Planer LIVE</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #2563eb;
            --success: #16a34a;
            --warning: #ea580c;
            --danger: #dc2626;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        h1 { font-size: 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .sync-indicator { font-size: 12px; color: #888; display: flex; align-items: center; gap: 5px; }
        
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { font-size: 16px; margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 8px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }

        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        
        .status-badge { padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-av { background: #dcfce7; color: var(--success); }
        .status-mid { background: #ffedd5; color: var(--warning); }
        .status-scr { background: #fee2e2; color: var(--danger); }

        .team-member { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); }
        .member-info { display: flex; flex-direction: column; gap: 4px; }
        .member-row { display: flex; align-items: center; gap: 8px; }
        .timer { font-family: monospace; font-weight: bold; font-size: 13px; color: #555; }

        .actions { display: flex; gap: 4px; }
        .btn-sm { padding: 6px 8px; font-size: 11px; width: auto; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-delete { background: transparent; color: #ccc; width: auto; padding: 0 5px; }
        .btn-delete:hover { color: var(--danger); }

        .schedule-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--bg-color); margin-bottom: 8px; border-radius: 6px; }
        .alert-banner { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; align-items: center; gap: 10px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i data-lucide="phone-call"></i> Support Pausen-Planer LIVE</h1>
        <div class="sync-indicator"><i data-lucide="refresh-cw" id="sync-icon"></i> <span id="sync-text">Verbinden...</span></div>
    </header>

    <div class="alert-banner" id="collision-alert">
        <i data-lucide="alert-triangle"></i> <strong>Achtung Überschneidung:</strong> Mehrere Kollegen haben zur gleichen Zeit Mittagspause eingetragen!
    </div>

    <div class="grid">
        <div>
            <div class="card">
                <h2><i data-lucide="user-plus"></i> Kollege hinzufügen</h2>
                <div class="form-group">
                    <input type="text" id="new-name" placeholder="Name des Agenten">
                </div>
                <button class="btn-primary" onclick="addMember()"><i data-lucide="plus"></i> Hinzufügen</button>
            </div>

            <div class="card">
                <h2><i data-lucide="calendar"></i> Mittagspause planen</h2>
                <div class="form-group">
                    <label for="sched-name">Wer?</label>
                    <select id="sched-name"></select>
                </div>
                <div class="form-group">
                    <label for="sched-time">Startzeit</label>
                    <input type="time" id="sched-time">
                </div>
                <button class="btn-primary" onclick="schedulePause()"><i data-lucide="clock"></i> Einplanen</button>
            </div>
        </div>

        <div>
            <div class="card">
                <h2><i data-lucide="users"></i> Live-Status des Teams (Aktualisiert alle 5s)</h2>
                <div id="team-list">Lade Team-Daten...</div>
            </div>

            <div class="card">
                <h2><i data-lucide="list-ordered"></i> Geplante Mittagspausen für heute</h2>
                <div id="schedule-list">Keine geplanten Pausen.</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Einzigartige Cloud-URL für euer Team (Kostenlose Echtzeit-Key-Value-Datenbank)
    // HINWEIS: "support_team_9921a" ist eure eindeutige ID.
    const DB_URL = "https://kvdb.io/MN87w6yH6p8SgXbU7t6P8B/support_team_9921a";

    let appData = {
        team: [
            { id: 1, name: "Beispiel-Agent 1", status: "Verfügbar", timeLeft: 0, lastUpdate: Date.now() },
            { id: 2, name: "Beispiel-Agent 2", status: "Verfügbar", timeLeft: 0, lastUpdate: Date.now() }
        ],
        schedules: []
    };

    async function loadData() {
        try {
            document.getElementById('sync-icon').style.animation = "spin 1s linear infinite";
            const response = await fetch(DB_URL);
            if (response.ok) {
                appData = await response.json();
                renderAll();
                document.getElementById('sync-text').innerText = "Live synchronisiert";
            } else if (response.status === 404) {
                // Falls die DB neu ist, initialen Stand hochladen
                await saveData();
            }
        } catch (e) {
            document.getElementById('sync-text').innerText = "Verbindungsfehler!";
        } finally {
            document.getElementById('sync-icon').style.animation = "none";
        }
    }

    async function saveData() {
        try {
            await fetch(DB_URL, {
                method: 'POST',
                body: JSON.stringify(appData)
            });
            renderAll();
        } catch (e) {
            console.error("Fehler beim Speichern", e);
        }
    }

    function renderAll() {
        renderTeam();
        renderSchedule();
        updateDropdowns();
    }

    function renderTeam() {
        const list = document.getElementById('team-list');
        list.innerHTML = '';
        
        appData.team.forEach(member => {
            let statusClass = 'status-av';
            if(member.status === 'Mittagspause') statusClass = 'status-mid';
            if(member.status === 'Bildschirmpause') statusClass = 'status-scr';

            let timerDisplay = '';
            if (member.status !== 'Verfügbar') {
                // Berechne die abgelaufene/verbleibende Zeit basierend auf dem Zeitstempel
                const passedSeconds = Math.floor((Date.now() - member.lastUpdate) / 1000);
                let currentTimerValue = 0;
                
                if (member.status === 'Mittagspause') {
                    currentTimerValue = Math.max(-120 * 60, member.timeLeft - passedSeconds); // Max 2 Std überziehen anzeigen
                } else {
                    currentTimerValue = member.timeLeft + passedSeconds;
                }

                const mins = Math.floor(Math.abs(currentTimerValue) / 60);
                const secs = Math.abs(currentTimerValue) % 60;
                const sign = currentTimerValue < 0 ? "-" : "";
                timerDisplay = `<span class="timer">${sign}${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}</span>`;
            }

            list.innerHTML += `
                <div class="team-member">
                    <div class="member-info">
                        <div class="member-row">
                            <strong>${member.name}</strong>
                            <button class="btn-delete" onclick="deleteMember(${member.id})">×</button>
                        </div>
                        <div>
                            <span class="status-badge ${statusClass}">${member.status}</span>
                            ${timerDisplay}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-sm btn-success" onclick="changeStatus(${member.id}, 'Verfügbar')">Bereit</button>
                        <button class="btn-sm btn-warning" onclick="changeStatus(${member.id}, 'Mittagspause')">Mittag</button>
                        <button class="btn-sm btn-danger" onclick="changeStatus(${member.id}, 'Bildschirmpause')">Bildschirm</button>
                    </div>
                </div>
            `;
        });
        lucide.createIcons();
    }

    function renderSchedule() {
        const list = document.getElementById('schedule-list');
        if(appData.schedules.length === 0) {
            list.innerHTML = 'Keine geplanten Pausen.';
            document.getElementById('collision-alert').style.display = 'none';
            return;
        }

        list.innerHTML = '';
        appData.schedules.sort((a,b) => a.time.localeCompare(b.time));

        appData.schedules.forEach(s => {
            list.innerHTML += `
                <div class="schedule-item" style="border-left: 4px solid var(--warning)">
                    <span>${s.name}</span>
                    <div>
                        <strong>${s.time} - ${add30Mins(s.time)} Uhr</strong>
                        <button class="btn-delete" onclick="deleteSchedule(${s.id})" style="display:inline; margin-left:10px;">×</button>
                    </div>
                </div>
            `;
        });
        
        checkCollisions();
        lucide.createIcons();
    }

    function updateDropdowns() {
        const select = document.getElementById('sched-name');
        select.innerHTML = '';
        appData.team.forEach(m => {
            select.innerHTML += `<option value="${m.name}">${m.name}</option>`;
        });
    }

    function changeStatus(id, newStatus) {
        const member = appData.team.find(m => m.id === id);
        if (!member) return;

        member.status = newStatus;
        member.lastUpdate = Date.now();
        
        if (newStatus === 'Mittagspause') {
            member.timeLeft = 30 * 60; 
        } else {
            member.timeLeft = 0;
        }
        saveData();
    }

    function addMember() {
        const nameInput = document.getElementById('new-name');
        if (!nameInput.value.trim()) return;

        appData.team.push({
            id: Date.now(),
            name: nameInput.value.trim(),
            status: "Verfügbar",
            timeLeft: 0,
            lastUpdate: Date.now()
        });

        nameInput.value = '';
        saveData();
    }

    function deleteMember(id) {
        appData.team = appData.team.filter(m => m.id !== id);
        saveData();
    }

    function schedulePause() {
        const name = document.getElementById('sched-name').value;
        const time = document.getElementById('sched-time').value;
        if (!time) return alert("Uhrzeit wählen!");

        appData.schedules.push({ id: Date.now(), name: name, time: time });
        saveData();
    }

    function deleteSchedule(id) {
        appData.schedules = appData.schedules.filter(s => s.id !== id);
        saveData();
    }

    function checkCollisions() {
        const alertBanner = document.getElementById('collision-alert');
        const times = appData.schedules.map(s => s.time);
        const hasDuplicates = times.some((val, i) => times.indexOf(val) !== i);
        alertBanner.style.display = hasDuplicates ? 'flex' : 'none';
    }

    function add30Mins(timeStr) {
        let [hrs, mins] = timeStr.split(':').map(Number);
        mins += 30;
        if (mins >= 60) { mins -= 60; hrs = (hrs + 1) % 24; }
        return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
    }

    // CSS Animation für Sync-Icon hinzufügen
    const style = document.createElement('style');
    style.innerHTML = '@keyframes spin { 100% { transform:rotate(360deg); } }';
    document.head.appendChild(style);

    // Initialisierung und automatische Updates
    window.onload = () => {
        loadData();
        // Alle 5 Sekunden die neusten Daten aus der Cloud holen
        setInterval(loadData, 5000);
        // Den Sekunden-Countdown lokal flüssig halten (jede Sekunde rendern)
        setInterval(renderTeam, 1000);
    };
</script>
</body>
</html>
